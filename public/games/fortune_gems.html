                0 0 10px #ff3838,

        .celebration-overlay.grand-win .win-title-blast {

        }

        @keyframes rainbowGlow {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(180deg); }
        }

        /* Gems showcase stage layout */
        .celebration-gems-container {
            position: relative;
            background: radial-gradient(ellipse at center, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            padding: 12px;
            margin: 5px 0;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .celebration-gems-showcase {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .celebration-gem-icon {
            width: 85px;
            height: 85px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.75)) drop-shadow(0 0 12px var(--tier-glow));
            animation: floatGem 1.6s ease-in-out infinite alternate;
        }

        .celebration-gem-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        }
        .celebration-gem-icon:nth-child(3) {
            animation-delay: 0.5s;
        }

        .celebration-counter-box {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.85));
        }

        .celebration-multiplier-badge {
            background: linear-gradient(135deg, #ff3838 0%, #ff8585 100%);

            border-radius: 12px;
            color: #ffffff;
            font-family: 'Orbitron', 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            padding: 6px 16px;

            letter-spacing: 1px;
            z-index: 6;
            margin-bottom: 5px;
            animation: pulseBtn 0.8s infinite alternate;
        }

        /* Spawning Coins rain container */
        .falling-coins-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .falling-coin-particle {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            user-select: none;
            animation: coinRain linear forwards;
        }

        @keyframes coinRain {
            0% {
                transform: translateY(-50px) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(0) rotate(20deg) scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110dvh) rotate(360deg) scale(0.8);
                opacity: 0;
            }
        }

        /* Golden shimmer Collect button */
        .celebration-collect-button {
            position: relative;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            background-size: 200% auto;
            border: 3.5px solid #ffffff;
            border-radius: 22px;
            color: #4a0200;
            font-family: var(--font-body);
            font-weight: 900;
            font-size: 1.35rem;
            padding: 14px 48px;
            cursor: pointer;
            box-shadow: 
                0 0 25px rgba(255, 215, 0, 0.45),
                0 8px 25px rgba(0, 0, 0, 0.65);
            transition: all 0.2s ease;
            outline: none;
            width: 90%;
            max-width: 320px;
            overflow: hidden;
            animation: shimmerBtn 3s infinite linear;
            z-index: 10;
        }

        @keyframes shimmerBtn {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .celebration-collect-button::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
            transform: skewX(-25deg);
            animation: sweepEffect 2.8s infinite;
        }

        @keyframes sweepEffect {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        .celebration-collect-button:active {
            transform: scale(0.95);
        }

        @keyframes pulseBtn {
            from { transform: scale(1); }
            to { transform: scale(1.06); }
        }

         /* Make standard overlay rounded as well */
        .notification-overlay {
            border-radius: 24px;
        }
    </style>
